<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Operativo CP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --cp-verde: #0f6b2d;
      --cp-amarillo: #f3c623;
      --cp-bg: #eef1f4;
    }
    body { background: var(--cp-bg); font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
    .navbar { background: var(--cp-verde); border-bottom: 4px solid var(--cp-amarillo); }
    .card-soft { border: 0; border-radius: 14px; box-shadow: 0 2px 10px rgba(0,0,0,.06); }
    .kpi-card { cursor: pointer; transition: transform .15s ease, box-shadow .15s ease; }
    .kpi-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,0,0,.08); }
    .kpi-title { font-size: .72rem; color: #6c757d; text-transform: uppercase; font-weight: 700; }
    .kpi-value { font-size: 1.55rem; font-weight: 800; line-height: 1.1; }
    .table-container { height: 420px; overflow: auto; border: 1px solid #dbe1e7; border-radius: 12px; background: #fff; }
    thead { position: sticky; top: 0; z-index: 2; }
    .status-badge { font-size: .72rem; border-radius: 999px; padding: .35rem .7rem; font-weight: 700; }
    .bg-disponible { background: #d1e7dd; color: #0f5132; }
    .bg-ocupado { background: #cfe2ff; color: #084298; }
    .bg-sobrestock { background: #f8d7da; color: #842029; }
    .table-input { min-width: 160px; }
    #loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,.84); z-index: 1055; display: none; align-items: center; justify-content: center; flex-direction: column; }
    .clickable { user-select: none; }
    .toast-container { z-index: 2000; }
    .nav-pills .nav-link { font-weight: 700; color: var(--cp-verde); border: 1px solid rgba(15,107,45,.3); }
    .nav-pills .nav-link.active { background: var(--cp-verde); }
    .chart-wrap { min-height: 320px; position: relative; }
  </style>
</head>
<body>
  <div id="loader-overlay">
    <div class="spinner-border text-success" role="status"></div>
    <div class="mt-2 fw-bold text-success">Sincronizando con Cerro Prieto...</div>
  </div>

  <div class="toast-container position-fixed top-0 end-0 p-3" id="toastContainer"></div>

  <nav class="navbar navbar-dark px-3 mb-3">
    <span class="navbar-brand fw-bold"><i class="bi bi-cpu-fill me-2"></i>DASHBOARD OPERATIVO CP</span>
  </nav>

  <main class="container-fluid px-3 pb-4">
    <ul class="nav nav-pills justify-content-center mb-3" id="mainTabs" role="tablist">
      <li class="nav-item"><button class="nav-link active" data-bs-toggle="pill" data-bs-target="#view-resumen" type="button">RESUMEN</button></li>
      <li class="nav-item ms-2"><button class="nav-link" data-bs-toggle="pill" data-bs-target="#view-detalle" type="button">DETALLE / EDICIÓN</button></li>
    </ul>

    <div class="tab-content">
      <section class="tab-pane fade show active" id="view-resumen">
        <div class="row g-2 mb-3 text-center" id="kpiCards"></div>
        <div class="row g-3">
          <div class="col-lg-4">
            <div class="card card-soft p-3 h-100">
              <div class="chart-wrap"><canvas id="ctxGrafico"></canvas></div>
            </div>
          </div>
          <div class="col-lg-8">
            <div id="resumenZonas" class="card card-soft p-3 h-100"></div>
          </div>
        </div>
      </section>

      <section class="tab-pane fade" id="view-detalle">
        <div class="card card-soft p-2 mb-3 bg-white">
          <div class="d-flex flex-wrap gap-2 justify-content-center" id="actionButtons">
            <button class="btn btn-outline-danger btn-sm" data-action="limpiarRangoGeneral"><i class="bi bi-eraser"></i> LIMPIAR A:H</button>
            <button class="btn btn-outline-danger btn-sm" data-action="limpiarConOmisiones" id="btnOmisiones"><i class="bi bi-scissors"></i> LIMPIAR CON OMISIONES</button>
            <button class="btn btn-outline-primary btn-sm" data-action="transferirConsolidadoAEtiquetar"><i class="bi bi-arrow-right-circle"></i> CONSOLIDADO -> ETIQUETAR</button>
            <button class="btn btn-outline-primary btn-sm" data-action="copiarEtiquetasAMasivo"><i class="bi bi-box-arrow-in-down"></i> ETIQUETAR -> MASIVO</button>
            <button class="btn btn-outline-success btn-sm" data-action="generarFormatoEtiqueta"><i class="bi bi-printer"></i> FORMATO ETIQUETA</button>
            <button class="btn btn-outline-dark btn-sm" data-action="actualizarTablasDinamicas"><i class="bi bi-arrow-clockwise"></i> REFRESCAR PIVOTS</button>
            <button class="btn btn-outline-warning btn-sm" data-action="filtrarSinStock"><i class="bi bi-filter-square"></i> FILTRAR SIN STOCK</button>
          </div>
        </div>

        <div class="card card-soft p-3 bg-white">
          <div class="row g-2 align-items-end mb-3">
            <div class="col-md-3">
              <label class="form-label fw-bold small mb-1">HOJA SELECCIONADA</label>
              <select class="form-select form-select-sm" id="selectorHoja"></select>
            </div>
            <div class="col-md-4">
              <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Buscar en esta hoja...">
            </div>
            <div class="col-md-5 d-flex gap-2">
              <button class="btn btn-dark btn-sm" id="btnReset">RESET</button>
              <button class="btn btn-success btn-sm" id="btnNuevaFila" style="display:none;"><i class="bi bi-plus-lg"></i> NUEVA FILA</button>
            </div>
          </div>

          <div class="table-container">
            <table class="table table-sm table-hover align-middle mb-0" id="mainTable">
              <thead class="table-light" id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-3">
            <button class="btn btn-outline-success btn-sm" id="btnAnterior">Anterior</button>
            <span class="fw-bold small" id="infoPaginacion">Página 1 de 1</span>
            <button class="btn btn-outline-success btn-sm" id="btnSiguiente">Siguiente</button>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const CONFIG = {
      SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbyPTKRi6vDUxH9eIQNwh8XZCZAucg44Dr0TvywARJ64bUcYCVfmkPnk9nsSjf6g5DyxoA/exec',
      PAGE_SIZE: 50,
      HOJAS: [
        'UBICACIONES', 'STOCK', 'REPOSICIÓN', 'CONSOLIDADO INGRESOS', 'ETIQUETAR',
        'FORMATO DE ETIQUETA', 'MASIVO_UBICACIONES', 'HISTORICO UBICACIONES',
        'INGRESOS DIARIOS', 'STOCK VARIOS', 'productos sin etiquetar', 'CONSIGNACIÓN', 'BACKUP'
      ],
      SUMMARY_FILTERS: {
        TODOS: () => true,
        DISPONIBLE: (row) => row.estado === 'DISPONIBLE',
        SOBRESTOCK: (row) => row.estado === 'SOBRESTOCK',
        OCUPADOS_FULL: (row) => row.estado !== 'DISPONIBLE'
      }
    };

    const state = {
      mode: 'GENERAL',
      hojaActual: 'UBICACIONES',
      paginaActual: 1,
      busqueda: '',
      ubicaciones: [],
      editableHeaders: [],
      editableRows: [],
      filteredRows: [],
      summaryFilter: 'TODOS',
      chart: null,
      loading: false
    };

    const els = {};

    const Api = {
      async getUbicaciones() {
        return this._request('getDashboard');
      },

      async getHoja(hoja, limit = 500) {
        return this._request('getHoja', { hoja, limit });
      },

      async saveRow(hoja, rowIndex, values) {
        return this._request('saveRow', { hoja, rowIndex, values }, 'POST');
      },

      async appendRow(hoja, values) {
        return this._request('appendRow', { hoja, values }, 'POST');
      },

      async deleteRow(hoja, rowIndex) {
        return this._request('deleteRow', { hoja, rowIndex }, 'POST');
      },

      async runAction(action, hoja) {
        return this._request('runAction', { action, hoja }, 'POST');
      },

      async _request(action, payload = {}, method = 'GET') {
        const url = new URL(CONFIG.SCRIPT_URL);

        if (method === 'GET') {
          url.searchParams.set('action', action);
          Object.entries(payload).forEach(([key, value]) => {
            if (value !== undefined && value !== null) url.searchParams.set(key, String(value));
          });

          const response = await fetch(url.toString(), {
            method: 'GET',
            redirect: 'follow',
            cache: 'no-store'
          });
          const json = await response.json();
          return this._normalize(json);
        }

        const response = await fetch(url.toString(), {
          method: 'POST',
          redirect: 'follow',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify({ action, ...payload })
        });
        const json = await response.json();
        return this._normalize(json);
      },

      _normalize(json) {
        if (!json || typeof json !== 'object') {
          throw new Error('Respuesta inválida del servidor');
        }
        if (json.ok === false) {
          throw new Error(json.message || 'Operación fallida');
        }
        return json.data;
      }
    };

    const WarehouseLogic = {
      normalizeUbicaciones(items = []) {
        return items
          .filter(Boolean)
          .map(item => ({
            id: String(item.id || ''),
            codigo: String(item.datosUbi?.[0] || ''),
            zona: String(item.datosUbi?.[1] || ''),
            grupo: String(item.datosUbi?.[2] || ''),
            estado: String(item.estado || 'DESCONOCIDO')
          }));
      },

      computeKpis(rows) {
        const total = rows.length;
        const disponibles = rows.filter(r => r.estado === 'DISPONIBLE').length;
        const sobrestock = rows.filter(r => r.estado === 'SOBRESTOCK').length;
        const ocupados = total - disponibles;
        return {
          total,
          disponibles,
          ocupados,
          sobrestock,
          porcentajeDisponible: total ? ((disponibles / total) * 100).toFixed(1) : '0.0',
          porcentajeOcupado: total ? ((ocupados / total) * 100).toFixed(1) : '0.0'
        };
      },

      groupByZona(rows) {
        const grouped = new Map();
        rows.forEach(row => {
          const zona = row.zona || 'SIN ZONA';
          if (!grouped.has(zona)) grouped.set(zona, []);
          grouped.get(zona).push(row);
        });
        return [...grouped.entries()]
          .map(([zona, items]) => {
            const total = items.length;
            const disponibles = items.filter(item => item.estado === 'DISPONIBLE').length;
            const ocupados = total - disponibles;
            return {
              zona,
              total,
              disponibles,
              ocupados,
              ocupacionPct: total ? Math.round((ocupados / total) * 100) : 0
            };
          })
          .sort((a, b) => a.zona.localeCompare(b.zona, 'es'));
      },

      filterDashboard(rows, term, summaryFilter) {
        const filterFn = CONFIG.SUMMARY_FILTERS[summaryFilter] || CONFIG.SUMMARY_FILTERS.TODOS;
        const text = (term || '').trim().toLowerCase();
        return rows.filter(row => {
          const summaryMatch = filterFn(row);
          if (!summaryMatch) return false;
          if (!text) return true;
          return [row.id, row.codigo, row.zona, row.grupo, row.estado].some(v => String(v).toLowerCase().includes(text));
        });
      },

      filterEditable(rows, term) {
        const text = (term || '').trim().toLowerCase();
        if (!text) return rows;
        return rows.filter(row => row.some(cell => String(cell ?? '').toLowerCase().includes(text)));
      },

      paginate(rows, page, size = CONFIG.PAGE_SIZE) {
        const totalPages = Math.max(1, Math.ceil(rows.length / size));
        const currentPage = Math.min(Math.max(1, page), totalPages);
        const start = (currentPage - 1) * size;
        return {
          rows: rows.slice(start, start + size),
          page: currentPage,
          totalPages
        };
      },

      createPalette(count) {
        return Array.from({ length: count }, (_, i) => `hsl(${Math.round((360 / Math.max(count, 1)) * i)}, 65%, 48%)`);
      }
    };

    const UI = {
      cache() {
        ['selectorHoja','searchInput','tableHead','tableBody','btnAnterior','btnSiguiente','infoPaginacion','resumenZonas','ctxGrafico','loader-overlay','btnNuevaFila','btnReset','btnOmisiones','kpiCards'].forEach(id => {
          els[id.replace(/-([a-z])/g, (_, c) => c.toUpperCase())] = document.getElementById(id);
        });
        els.toastContainer = document.getElementById('toastContainer');
      },

      initSelectors() {
        els.selectorHoja.innerHTML = CONFIG.HOJAS.map(hoja => `<option value="${this.escapeHtml(hoja)}">${this.escapeHtml(hoja)}</option>`).join('');
        els.selectorHoja.value = state.hojaActual;
      },

      setLoading(show) {
        state.loading = show;
        els.loaderOverlay.style.display = show ? 'flex' : 'none';
      },

      showToast(message, type = 'success') {
        const tone = {
          success: 'text-bg-success',
          danger: 'text-bg-danger',
          warning: 'text-bg-warning',
          info: 'text-bg-dark'
        }[type] || 'text-bg-dark';
        const wrapper = document.createElement('div');
        wrapper.innerHTML = `
          <div class="toast align-items-center ${tone} border-0" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
              <div class="toast-body fw-semibold">${this.escapeHtml(message)}</div>
              <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
          </div>`;
        const toastEl = wrapper.firstElementChild;
        els.toastContainer.appendChild(toastEl);
        const toast = new bootstrap.Toast(toastEl, { delay: 4500 });
        toast.show();
        toastEl.addEventListener('hidden.bs.toast', () => toastEl.remove());
      },

      updateActionVisibility() {
        els.btnNuevaFila.style.display = state.mode === 'EDIT' ? 'inline-flex' : 'none';
        els.btnOmisiones.style.display = state.hojaActual === 'ETIQUETAR' ? 'inline-flex' : 'none';
      },

      renderDashboard() {
        const visibleRows = WarehouseLogic.filterDashboard(state.ubicaciones, state.busqueda, state.summaryFilter);
        state.filteredRows = visibleRows;
        const kpis = WarehouseLogic.computeKpis(state.ubicaciones);

        els.kpiCards.innerHTML = `
          ${this.renderKpiCard('TODOS', 'Capacidad', kpis.total, '', 'dark')}
          ${this.renderKpiCard('OCUPADOS_FULL', 'Ocupado', kpis.ocupados, `${kpis.porcentajeOcupado}%`, 'primary')}
          ${this.renderKpiCard('SOBRESTOCK', 'Sobrestock', kpis.sobrestock, '', 'danger')}
          ${this.renderKpiCard('DISPONIBLE', 'Libre', kpis.disponibles, `${kpis.porcentajeDisponible}%`, 'success')}
        `;

        this.renderDashboardTable();
        this.renderChart(WarehouseLogic.groupByZona(state.ubicaciones));
        this.renderZones(WarehouseLogic.groupByZona(state.ubicaciones));
      },

      renderKpiCard(filterKey, title, value, subtitle, color) {
        return `
          <div class="col clickable" data-summary-filter="${filterKey}">
            <div class="card card-soft kpi-card p-2 border-start border-4 border-${color}">
              <div class="kpi-title">${title}</div>
              <div class="kpi-value text-${color}">${this.escapeHtml(String(value))}</div>
              <div class="small fw-bold text-${color}">${this.escapeHtml(subtitle || '')}</div>
            </div>
          </div>`;
      },

      renderDashboardTable() {
        const page = WarehouseLogic.paginate(state.filteredRows, state.paginaActual);
        state.paginaActual = page.page;
        els.tableHead.innerHTML = '<tr><th>UBICACIÓN</th><th>ZONA</th><th>GRUPO</th><th>ESTADO</th></tr>';
        els.tableBody.innerHTML = page.rows.map(item => {
          const badge = item.estado === 'DISPONIBLE' ? 'bg-disponible' : item.estado === 'SOBRESTOCK' ? 'bg-sobrestock' : 'bg-ocupado';
          return `<tr>
            <td><strong>${this.escapeHtml(item.codigo)}</strong></td>
            <td>${this.escapeHtml(item.zona)}</td>
            <td>${this.escapeHtml(item.grupo)}</td>
            <td><span class="status-badge ${badge}">${this.escapeHtml(item.estado)}</span></td>
          </tr>`;
        }).join('') || '<tr><td colspan="4" class="text-center text-muted py-4">Sin resultados</td></tr>';
        this.renderPagination(page.page, page.totalPages);
      },

      renderEditable() {
        const rows = WarehouseLogic.filterEditable(state.editableRows, state.busqueda);
        state.filteredRows = rows;
        const page = WarehouseLogic.paginate(rows, state.paginaActual);
        state.paginaActual = page.page;

        const headerHtml = state.editableHeaders.map(h => `<th>${this.escapeHtml(String(h))}</th>`).join('') + '<th>ACCIONES</th>';
        els.tableHead.innerHTML = `<tr>${headerHtml}</tr>`;
        els.tableBody.innerHTML = '';

        if (!page.rows.length) {
          els.tableBody.innerHTML = '<tr><td colspan="99" class="text-center text-muted py-4">Sin resultados</td></tr>';
          this.renderPagination(page.page, page.totalPages);
          return;
        }

        const fragment = document.createDocumentFragment();
        page.rows.forEach((row, i) => {
          const realIndex = ((page.page - 1) * CONFIG.PAGE_SIZE) + i;
          const tr = document.createElement('tr');
          row.forEach((cell, colIdx) => {
            const td = document.createElement('td');
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'form-control form-control-sm table-input';
            input.value = cell == null ? '' : String(cell);
            input.dataset.rowIndex = String(realIndex);
            input.dataset.colIndex = String(colIdx);
            td.appendChild(input);
            tr.appendChild(td);
          });
          const tdActions = document.createElement('td');
          tdActions.innerHTML = `
            <div class="d-flex gap-1">
              <button class="btn btn-success btn-sm" data-row-save="${realIndex}" title="Guardar"><i class="bi bi-floppy"></i></button>
              <button class="btn btn-danger btn-sm" data-row-delete="${realIndex}" title="Eliminar"><i class="bi bi-trash"></i></button>
            </div>`;
          tr.appendChild(tdActions);
          fragment.appendChild(tr);
        });
        els.tableBody.appendChild(fragment);
        this.renderPagination(page.page, page.totalPages);
      },

      renderPagination(page, totalPages) {
        els.infoPaginacion.textContent = `Página ${page} de ${totalPages}`;
        els.btnAnterior.disabled = page <= 1;
        els.btnSiguiente.disabled = page >= totalPages;
      },

      renderChart(zoneStats) {
        if (state.chart) state.chart.destroy();
        const colors = WarehouseLogic.createPalette(zoneStats.length);
        state.chart = new Chart(els.ctxGrafico.getContext('2d'), {
          type: 'doughnut',
          data: {
            labels: zoneStats.map(z => z.zona),
            datasets: [{ data: zoneStats.map(z => z.ocupados), backgroundColor: colors }]
          },
          options: {
            maintainAspectRatio: false,
            plugins: { legend: { position: 'bottom' } }
          }
        });
      },

      renderZones(zoneStats) {
        els.resumenZonas.innerHTML = `<div class="row row-cols-1 row-cols-md-2 g-2">${zoneStats.map(z => `
          <div class="col">
            <div class="border rounded p-2 bg-light small fw-semibold">
              <div>${this.escapeHtml(z.zona)} <span class="float-end text-success">${z.disponibles} libres</span></div>
              <div class="progress mt-2" style="height: 8px;">
                <div class="progress-bar bg-success" style="width:${z.ocupacionPct}%"></div>
              </div>
            </div>
          </div>`).join('')}</div>`;
      },

      escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#39;');
      }
    };

    const Controller = {
      async init() {
        UI.cache();
        UI.initSelectors();
        this.bindEvents();
        await this.loadDashboard();
      },

      bindEvents() {
        els.selectorHoja.addEventListener('change', () => this.changeSheet(els.selectorHoja.value));
        els.searchInput.addEventListener('input', (event) => {
          state.busqueda = event.target.value || '';
          state.paginaActual = 1;
          this.renderCurrent();
        });
        els.btnAnterior.addEventListener('click', () => this.changePage(-1));
        els.btnSiguiente.addEventListener('click', () => this.changePage(1));
        els.btnReset.addEventListener('click', () => this.resetView());
        els.btnNuevaFila.addEventListener('click', () => this.addNewRow());

        document.getElementById('actionButtons').addEventListener('click', (event) => {
          const button = event.target.closest('[data-action]');
          if (!button) return;
          this.executeAction(button.dataset.action);
        });

        document.body.addEventListener('click', (event) => {
          const summary = event.target.closest('[data-summary-filter]');
          if (summary) {
            this.goToDetailAndFilter(summary.dataset.summaryFilter);
            return;
          }

          const saveButton = event.target.closest('[data-row-save]');
          if (saveButton) {
            this.saveEditableRow(Number(saveButton.dataset.rowSave));
            return;
          }

          const deleteButton = event.target.closest('[data-row-delete]');
          if (deleteButton) {
            this.deleteEditableRow(Number(deleteButton.dataset.rowDelete));
          }
        });
      },

      async loadDashboard() {
        UI.setLoading(true);
        try {
          const data = await Api.getUbicaciones();
          state.mode = 'GENERAL';
          state.hojaActual = 'UBICACIONES';
          state.summaryFilter = 'TODOS';
          state.ubicaciones = WarehouseLogic.normalizeUbicaciones(data);
          state.busqueda = '';
          state.paginaActual = 1;
          els.selectorHoja.value = 'UBICACIONES';
          els.searchInput.value = '';
          UI.updateActionVisibility();
          this.renderCurrent();
        } catch (error) {
          UI.showToast(error.message, 'danger');
        } finally {
          UI.setLoading(false);
        }
      },

      async changeSheet(hoja) {
        state.hojaActual = hoja;
        state.busqueda = '';
        els.searchInput.value = '';
        state.paginaActual = 1;

        if (hoja === 'UBICACIONES') {
          await this.loadDashboard();
          return;
        }

        UI.setLoading(true);
        try {
          const payload = await Api.getHoja(hoja);
          const headers = payload.headers || [];
          const rows = payload.rows || [];
          state.mode = 'EDIT';
          state.editableHeaders = headers;
          state.editableRows = rows;
          UI.updateActionVisibility();
          this.renderCurrent();
        } catch (error) {
          UI.showToast(error.message, 'danger');
        } finally {
          UI.setLoading(false);
        }
      },

      renderCurrent() {
        if (state.mode === 'EDIT') {
          UI.renderEditable();
        } else {
          UI.renderDashboard();
        }
        UI.updateActionVisibility();
      },

      changePage(delta) {
        state.paginaActual += delta;
        this.renderCurrent();
      },

      resetView() {
        this.changeSheet('UBICACIONES');
      },

      addNewRow() {
        if (state.mode !== 'EDIT') return;
        state.editableRows.unshift(state.editableHeaders.map(() => ''));
        state.paginaActual = 1;
        this.renderCurrent();
      },

      async saveEditableRow(rowIndex) {
        const inputs = [...document.querySelectorAll(`input[data-row-index="${rowIndex}"]`)];
        if (!inputs.length) return;
        const values = state.editableHeaders.map((_, colIndex) => {
          const input = inputs.find(item => Number(item.dataset.colIndex) === colIndex);
          return input ? input.value : '';
        });

        UI.setLoading(true);
        try {
          const isDraftRow = state.editableRows[rowIndex] && state.editableRows[rowIndex].every(cell => String(cell ?? '') === '');
          if (isDraftRow) {
            await Api.appendRow(state.hojaActual, values);
            UI.showToast('Fila creada correctamente');
          } else {
            await Api.saveRow(state.hojaActual, rowIndex + 2, values);
            UI.showToast('Fila guardada correctamente');
          }
          await this.changeSheet(state.hojaActual);
        } catch (error) {
          UI.showToast(error.message, 'danger');
        } finally {
          UI.setLoading(false);
        }
      },

      async deleteEditableRow(rowIndex) {
        const row = state.editableRows[rowIndex];
        const isDraftRow = row && row.every(cell => String(cell ?? '') === '');
        if (isDraftRow) {
          state.editableRows.splice(rowIndex, 1);
          this.renderCurrent();
          return;
        }

        if (!confirm('¿Eliminar esta fila permanentemente?')) return;
        UI.setLoading(true);
        try {
          await Api.deleteRow(state.hojaActual, rowIndex + 2);
          UI.showToast('Fila eliminada correctamente');
          await this.changeSheet(state.hojaActual);
        } catch (error) {
          UI.showToast(error.message, 'danger');
        } finally {
          UI.setLoading(false);
        }
      },

      async executeAction(action) {
        const dangerous = ['limpiarRangoGeneral', 'limpiarConOmisiones'];
        if (dangerous.includes(action)) {
          const confirmText = `Vas a ejecutar ${action} sobre ${state.hojaActual}. ¿Continuar?`;
          if (!confirm(confirmText)) return;
        }

        UI.setLoading(true);
        try {
          const result = await Api.runAction(action, state.hojaActual);
          UI.showToast(result.message || 'Acción ejecutada');
          if (state.hojaActual === 'UBICACIONES') {
            await this.loadDashboard();
          } else {
            await this.changeSheet(state.hojaActual);
          }
        } catch (error) {
          UI.showToast(error.message, 'danger');
        } finally {
          UI.setLoading(false);
        }
      },

      goToDetailAndFilter(filterKey) {
        state.summaryFilter = filterKey;
        state.busqueda = '';
        els.searchInput.value = '';
        state.paginaActual = 1;
        document.querySelector('[data-bs-target="#view-detalle"]').click();
        state.mode = 'GENERAL';
        state.hojaActual = 'UBICACIONES';
        els.selectorHoja.value = 'UBICACIONES';
        this.renderCurrent();
      }
    };

    window.addEventListener('DOMContentLoaded', () => Controller.init());
  </script>
</body>
</html>
