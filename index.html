<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ubicaciones - MVP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background-color: #1a5928; } /* Verde tipo Agrícola */
        .card { border: none; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .status-badge { font-size: 0.8rem; padding: 5px 10px; border-radius: 20px; }
        .bg-disponible { background-color: #d1e7dd; color: #0f5132; }
        .bg-ocupado { background-color: #f8d7da; color: #842029; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark px-3 mb-4">
    <span class="navbar-brand mb-0 h1">Sistema de Gestión de Ubicaciones v1.0</span>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h6>Total Ubicaciones</h6>
                <h2 id="totalUbi">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h6>Ocupadas</h6>
                <h2 class="text-danger" id="totalOcupadas">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h6>Disponibilidad</h6>
                <h2 class="text-success" id="percDisp">0%</h2>
            </div>
        </div>
    </div>

    <div class="card p-4">
        <div class="d-flex justify-content-between mb-3">
            <input type="text" id="searchInput" class="form-control w-50" placeholder="Buscar por código, zona o material...">
            <button class="btn btn-success" onclick="nuevoRegistro()">+ Nuevo Registro</button>
        </div>
        
        <div class="table-responsive">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Código</th>
                        <th>Zona/Fila</th>
                        <th>Material</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 1. Simulación de los datos de tu Excel (Table1 / Table3)
    let ubicaciones = [
        { id: "A-01-01", zona: "Almacén Central", material: "Fertilizante NPK", estado: "Ocupado" },
        { id: "A-01-02", zona: "Almacén Central", material: "Cajas Packing", estado: "Disponible" },
        { id: "B-05-10", zona: "Zona Campo 4", material: "Mangueras Riego", estado: "Ocupado" },
        { id: "C-02-05", zona: "Mantenimiento", material: "Repuestos Tractor", estado: "Disponible" }
    ];

    // 2. Función para renderizar la tabla (Equivalente a tus macros de filtrado)
    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        
        data.forEach((item, index) => {
            const badgeClass = item.estado === 'Disponible' ? 'bg-disponible' : 'bg-ocupado';
            tbody.innerHTML += `
                <tr>
                    <td><strong>${item.id}</strong></td>
                    <td>${item.zona}</td>
                    <td>${item.material}</td>
                    <td><span class="status-badge ${badgeClass}">${item.estado}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary" onclick="editar(${index})">Editar</button>
                    </td>
                </tr>
            `;
        });
        actualizarKPIs();
    }

    // 3. Buscador en tiempo real (Slicers dinámicos)
    document.getElementById('searchInput').addEventListener('keyup', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = ubicaciones.filter(u => 
            u.id.toLowerCase().includes(term) || 
            u.zona.toLowerCase().includes(term) ||
            u.material.toLowerCase().includes(term)
        );
        renderTable(filtered);
    });

    // 4. Lógica de KPIs para Gerencia
    function actualizarKPIs() {
        const total = ubicaciones.length;
        const ocupadas = ubicaciones.filter(u => u.estado === 'Ocupado').length;
        const dispPerc = ((total - ocupadas) / total * 100).toFixed(1);

        document.getElementById('totalUbi').innerText = total;
        document.getElementById('totalOcupadas').innerText = ocupadas;
        document.getElementById('percDisp').innerText = dispPerc + '%';
    }

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPTKRi6vDUxH9eIQNwh8XZCZAucg44Dr0TvywARJ64bUcYCVfmkPnk9nsSjf6g5DyxoA/exec';

async function guardarEnGoogle() {
    const nuevaUbi = {
        id: prompt("Ingrese Código de Ubicación:"),
        zona: prompt("Ingrese Zona/Fila:"),
        material: prompt("Ingrese Material:"),
        estado: "Ocupado"
    };

    if(!nuevaUbi.id) return; // Cancelar si está vacío

    try {
        const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify(nuevaUbi)
        });
        
        if (response.ok) {
            alert("¡Dato guardado en Google Sheets, jefe!");
            location.reload(); // Recarga para ver el nuevo dato
        }
    } catch (error) {
        console.error("Error:", error);
        alert("Falló el envío, revisa la conexión.");
    }
}

    // Carga inicial
    renderTable(ubicaciones);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
