<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Ubicaciones - Agrícola Cerro Prieto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow-x: hidden; }
        .navbar { background-color: #1a5928; border-bottom: 4px solid #f9ca24; padding: 0.5rem 1rem; }
        .card { border: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 8px; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 12px; text-transform: uppercase; font-weight: bold; }
        .bg-disponible { background-color: #d1e7dd; color: #0f5132; }
        .bg-ocupado { background-color: #f8d7da; color: #842029; }
        
        .table-container { 
            height: 500px; 
            overflow-y: auto; 
            border: 1px solid #dee2e6;
            background: white;
            border-radius: 8px;
        }
        thead { position: sticky; top: 0; background-color: #f8f9fa; z-index: 1; border-bottom: 2px solid #dee2e6; }
        
        #loader { text-align: center; padding: 20px; font-weight: bold; color: #1a5928; }
        .btn-filter { font-weight: 600; text-transform: uppercase; font-size: 0.75rem; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-3">
    <span class="navbar-brand mb-0 h1">📍 Panel de Ubicaciones</span>
</nav>

<div class="container-fluid px-4">
    <div class="row g-2 mb-3">
        <div class="col-4">
            <div class="card text-center p-2">
                <small class="text-muted d-block">Total</small>
                <strong id="totalUbi">...</strong>
            </div>
        </div>
        <div class="col-4">
            <div class="card text-center p-2">
                <small class="text-muted d-block text-danger">Ocupadas</small>
                <strong class="text-danger" id="totalOcupadas">...</strong>
            </div>
        </div>
        <div class="col-4">
            <div class="card text-center p-2">
                <small class="text-muted d-block text-success">Disponible</small>
                <strong class="text-success" id="percDisp">...%</strong>
            </div>
        </div>
    </div>

    <div class="card p-3">
        <div class="row g-2 mb-3 align-items-center">
            <div class="col-12 col-md-4">
                <input type="text" id="searchInput" class="form-control form-control-sm" placeholder="Buscar por código o material...">
            </div>
            <div class="col-12 col-md-3">
                <select id="organizadorFilter" class="form-select form-select-sm" onchange="filtrarOrganizador()">
                    <option value="TODOS">Todos los Organizadores</option>
                </select>
            </div>
            <div class="col-12 col-md-5 d-flex gap-1">
                <button class="btn btn-outline-secondary btn-sm btn-filter flex-grow-1" onclick="filtrar('TODOS')">Ver Todo</button>
                <button class="btn btn-success btn-sm btn-filter flex-grow-1" onclick="filtrar('DISPONIBLE')">Libres</button>
                <button class="btn btn-danger btn-sm btn-filter flex-grow-1" onclick="filtrar('OCUPADO')">Llenos</button>
                <button class="btn btn-primary btn-sm px-3" onclick="guardarEnGoogle()">+</button>
            </div>
        </div>
        
        <div id="loader">Conectando con la nube de Cerro Prieto...</div>

        <div class="table-container d-none" id="mainWrapper">
            <table class="table table-sm table-hover mb-0">
                <thead>
                    <tr>
                        <th>CÓDIGO</th>
                        <th>ZONA/FILA</th>
                        <th>MATERIAL</th>
                        <th>ESTADO</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyPTKRi6vDUxH9eIQNwh8XZCZAucg44Dr0TvywARJ64bUcYCVfmkPnk9nsSjf6g5DyxoA/exec';
    let ubicaciones = [];

    async function cargarDatosDesdeGoogle() {
    const loader = document.getElementById('loader');
    const wrapper = document.getElementById('mainWrapper');

    // 1. CARGA INSTANTÁNEA: ¿Hay algo en la memoria del navegador?
    const cache = localStorage.getItem('cache_ubi');
    if (cache) {
        ubicaciones = JSON.parse(cache);
        renderTable(ubicaciones);
        loader.style.display = 'none';
        wrapper.classList.remove('d-none');
        console.log("Cargado desde caché para velocidad máxima");
    }

    // 2. CARGA DE FONDO: Traemos la data fresca de Google
    try {
        const response = await fetch(SCRIPT_URL);
        const freshData = await response.json();
        
        // Guardamos para la próxima vez
        localStorage.setItem('cache_ubi', JSON.stringify(freshData));
        
        ubicaciones = freshData;
        renderTable(ubicaciones);
        
        loader.style.display = 'none';
        wrapper.classList.remove('d-none');
    } catch (error) {
        console.error("Error:", error);
        if(!cache) loader.innerText = "Error de conexión.";
    }
}

    // Llena el selector con las zonas únicas del Excel
    function llenarSelectorOrganizadores() {
        const select = document.getElementById('organizadorFilter');
        const zonasUnicas = [...new Set(ubicaciones.map(u => u.zona))].sort();
        
        zonasUnicas.forEach(zona => {
            if(zona) {
                const opt = document.createElement('option');
                opt.value = zona;
                opt.textContent = zona;
                select.appendChild(opt);
            }
        });
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        data.forEach((item) => {
            const badgeClass = item.estado === 'DISPONIBLE' ? 'bg-disponible' : 'bg-ocupado';
            tbody.innerHTML += `
                <tr>
                    <td><strong><small>${item.id}</small></strong></td>
                    <td><small>${item.zona}</small></td>
                    <td><small>${item.material ? item.material : '---'}</small></td>
                    <td><span class="status-badge ${badgeClass}">${item.estado}</span></td>
                </tr>`;
        });
        actualizarKPIs(data);
    }

    // Filtro por Estado (Botones)
    function filtrar(tipo) {
        document.getElementById('organizadorFilter').value = 'TODOS'; // Reset selector
        if (tipo === 'TODOS') {
            renderTable(ubicaciones);
        } else {
            const filtrados = ubicaciones.filter(u => u.estado === tipo);
            renderTable(filtrados);
        }
    }

    // Filtro por Organizador (Selector)
    function filtrarOrganizador() {
        const zonaSeleccionada = document.getElementById('organizadorFilter').value;
        if (zonaSeleccionada === 'TODOS') {
            renderTable(ubicaciones);
        } else {
            const filtrados = ubicaciones.filter(u => u.zona === zonaSeleccionada);
            renderTable(filtrados);
        }
    }

    // Buscador General
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = ubicaciones.filter(u => 
            (u.id + u.zona + u.material).toLowerCase().includes(term)
        );
        renderTable(filtered);
    });

    function actualizarKPIs(data) {
        const total = data.length;
        const ocupadas = data.filter(u => u.estado === 'OCUPADO').length;
        const dispPerc = total > 0 ? ((total - ocupadas) / total * 100).toFixed(1) : 0;
        document.getElementById('totalUbi').innerText = total;
        document.getElementById('totalOcupadas').innerText = ocupadas;
        document.getElementById('percDisp').innerText = dispPerc + '%';
    }

    async function guardarEnGoogle() {
        const id = prompt("Código:");
        const zona = prompt("Zona:");
        const material = prompt("Material:");
        if(!id || !zona) return;

        const nuevaUbi = { id, zona, material, estado: "OCUPADO" };
        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(nuevaUbi)
            });
            alert("✅ Enviado. Recargando...");
            setTimeout(() => location.reload(), 1500); 
        } catch (error) {
            alert("Error al guardar.");
        }
    }

    window.onload = cargarDatosDesdeGoogle;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
